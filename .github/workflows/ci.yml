name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install coverage

      - name: Compile Python sources
        run: python -m compileall terminalcrypt tests cryptex_terminal.py

      - name: Run unit tests with coverage
        run: |
          coverage run -m unittest discover -s tests
          coverage report --show-missing

      - name: Check installed dependencies
        run: python -m pip check

      - name: Check CLI entrypoints
        run: |
          python -m terminalcrypt --version
          terminalcrypt --version

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build maturin twine

      - name: Build source distribution and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Test built wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          terminalcrypt --version
          python -c "import terminalcrypt; print(terminalcrypt.__version__)"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: terminalcrypt-dist
          path: dist/*
